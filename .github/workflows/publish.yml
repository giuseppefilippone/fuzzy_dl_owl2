name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: |
          pipx run --spec build pyproject-build --sdist --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_BUILD_FRONTEND: "pip"
          CIBW_BEFORE_ALL_LINUX: |
              /opt/python/cp311-cp311/bin/python -m pip install \
                --upgrade \
                --only-binary=:all: \
                --target /opt/re2c-python \
                "re2c>=4.0"
            
              cat > /usr/local/bin/re2c <<'EOF'
              #!/bin/sh
              export PYTHONPATH=/opt/re2c-python
              exec /opt/python/cp311-cp311/bin/python -c 'import sys; sys.argv[0] = "re2c"; from re2c import re2c; raise SystemExit(re2c())' "$@"
              EOF
            
              chmod +x /usr/local/bin/re2c
            
              ln -sf /usr/local/bin/re2c /opt/python/cp311-cp311/bin/re2c
              ln -sf /usr/local/bin/re2c /opt/python/cp312-cp312/bin/re2c
              ln -sf /usr/local/bin/re2c /opt/python/cp313-cp313/bin/re2c
            
              which re2c
              re2c --version
          CIBW_BEFORE_ALL_MACOS: |
              brew install re2c || true
              re2c --version
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  pypi-publish:
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1