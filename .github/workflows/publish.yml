name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: |
          pipx run --spec build pyproject-build --sdist --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Build release distributions
        run: |
          python -m pip install build
          # The repo-root build.py (poetry build script) shadows the pypa
          # `build` package when invoked as `python -m build`; the
          # pyproject-build console script avoids the sys.path collision.
          pyproject-build
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_*"
          # build.py compiles in-place: delete binaries left by the previous
          # Python version so they don't leak into the next wheel.
          CIBW_BEFORE_BUILD: python -c "import pathlib; [p.unlink() for g in ('*.so','*.pyd') for p in pathlib.Path('.').rglob(g)]"
          # Refuse to publish wheels that cannot even be imported.
          CIBW_TEST_COMMAND: python -c "import fuzzy_dl_owl2"
          CIBW_BUILD_FRONTEND: "pip"
          CIBW_BEFORE_ALL_LINUX: |
              /opt/python/cp311-cp311/bin/python -m pip install \
                --upgrade \
                --only-binary=:all: \
                --target /opt/re2c-python \
                "re2c>=4.0"
            
              cat > /usr/local/bin/re2c <<'EOF'
              #!/bin/sh
              export PYTHONPATH=/opt/re2c-python
              exec /opt/python/cp311-cp311/bin/python -c 'import sys; sys.argv[0] = "re2c"; from re2c import re2c; raise SystemExit(re2c())' "$@"
              EOF
            
              chmod +x /usr/local/bin/re2c
            
              ln -sf /usr/local/bin/re2c /opt/python/cp311-cp311/bin/re2c
              ln -sf /usr/local/bin/re2c /opt/python/cp312-cp312/bin/re2c
              ln -sf /usr/local/bin/re2c /opt/python/cp313-cp313/bin/re2c
            
              which re2c
              re2c --version
          CIBW_BEFORE_ALL_MACOS: |
              brew install re2c || true
              re2c --version
      - name: Strip Linux wheels
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python -m pip install --upgrade wheel
          mkdir -p wheelhouse_stripped
      
          for whl in wheelhouse/*.whl; do
            tmp="$(mktemp -d)"
            python -m wheel unpack "$whl" -d "$tmp"
            unpacked="$(find "$tmp" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
      
            find "$unpacked" -name "*.so" -exec strip --strip-unneeded {} + || true
      
            python -m wheel pack "$unpacked" -d wheelhouse_stripped
            rm -rf "$tmp"
          done
      
          rm -f wheelhouse/*.whl
          mv wheelhouse_stripped/*.whl wheelhouse/
      
          ls -lh wheelhouse
      - name: Show wheel sizes
        shell: bash
        run: |
          ls -lh wheelhouse
          python - <<'PY'
          from pathlib import Path
          for p in sorted(Path("wheelhouse").glob("*.whl")):
              print(f"{p.name}: {p.stat().st_size / 1024 / 1024:.2f} MB")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl


  pypi-publish:
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # trusted publishing (OIDC)
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/project/fuzzy-dl-owl2/
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1